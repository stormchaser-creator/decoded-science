# Nginx config for connectome.theencodedhumanproject.com
# Place at: /opt/homebrew/etc/nginx/servers/connectome.conf
#         or /etc/nginx/sites-available/connectome
#
# Cloudflare DNS: Add CNAME record
#   Name:    connectome
#   Target:  theencodedhumanproject.com  (or your server IP)
#   Proxied: Yes

server {
    listen 80;
    server_name connectome.theencodedhumanproject.com;

    # Redirect HTTP → HTTPS (Cloudflare handles TLS termination)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name connectome.theencodedhumanproject.com;

    # SSL — managed by Cloudflare Origin Certificate or Let's Encrypt
    # ssl_certificate     /etc/ssl/connectome.pem;
    # ssl_certificate_key /etc/ssl/connectome-key.pem;

    # API endpoints → FastAPI (port 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Direct API access (no /api prefix) for Pearl integration
    location ~ ^/(health|stats|papers|connections|search|bridge|analyze|connectome|auth|workspace) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React Explorer → Vite built files
    root /Users/whit/Projects/Decoded/explorer/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    access_log /var/log/nginx/connectome-access.log;
    error_log  /var/log/nginx/connectome-error.log;
}
