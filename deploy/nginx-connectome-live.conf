# Nginx config for connectome.theencodedhumanproject.com
# Cloudflare Tunnel handles TLS — this listens on port 8080 (HTTP only)

server {
    listen 8080;
    server_name connectome.theencodedhuman.com;

    # API endpoints → FastAPI (port 8000)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Direct API access (no /api prefix) — Pearl + health checks
    # Note: papers, connections, bridge are SPA routes — served via try_files below
    location ~ ^/(health|stats|search|analyze|connectome|auth|workspace) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React Explorer → Vite built files
    root /Users/whit/Projects/Decoded/explorer/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    access_log /opt/homebrew/var/log/nginx/connectome-access.log;
    error_log  /opt/homebrew/var/log/nginx/connectome-error.log;
}
