        <h2>AI-Powered Literature Connectome</h2>
        <p>The Decoded Human builds an AI-powered knowledge graph that discovers hidden connections across scientific literature. We ingest open-access research papers, extract their core scientific content — entities, claims, mechanisms, methods — and build a living network where every paper is connected not just by citations, but by what it actually says.</p>
        <p>The result is a literature connectome: a structural map of how scientific knowledge actually relates across disciplines, methods, and findings.</p>
