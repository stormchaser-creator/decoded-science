<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#120e24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#7c6af7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c6af7;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle network graph lines -->
  <g stroke="#7c6af7" stroke-opacity="0.08" stroke-width="1" fill="none">
    <line x1="150" y1="120" x2="350" y2="200"/>
    <line x1="350" y1="200" x2="500" y2="150"/>
    <line x1="500" y1="150" x2="700" y2="250"/>
    <line x1="700" y1="250" x2="850" y2="180"/>
    <line x1="850" y1="180" x2="1050" y2="220"/>
    <line x1="200" y1="400" x2="400" y2="450"/>
    <line x1="400" y1="450" x2="600" y2="380"/>
    <line x1="600" y1="380" x2="800" y2="480"/>
    <line x1="800" y1="480" x2="1000" y2="420"/>
    <line x1="350" y1="200" x2="400" y2="450"/>
    <line x1="700" y1="250" x2="600" y2="380"/>
    <line x1="850" y1="180" x2="1000" y2="420"/>
    <line x1="500" y1="150" x2="600" y2="380"/>
    <line x1="150" y1="120" x2="200" y2="400"/>
    <line x1="1050" y1="220" x2="1000" y2="420"/>
  </g>

  <!-- Network nodes -->
  <g fill="#7c6af7" opacity="0.2">
    <circle cx="150" cy="120" r="4"/>
    <circle cx="350" cy="200" r="5"/>
    <circle cx="500" cy="150" r="3"/>
    <circle cx="700" cy="250" r="6"/>
    <circle cx="850" cy="180" r="4"/>
    <circle cx="1050" cy="220" r="5"/>
    <circle cx="200" cy="400" r="3"/>
    <circle cx="400" cy="450" r="5"/>
    <circle cx="600" cy="380" r="4"/>
    <circle cx="800" cy="480" r="5"/>
    <circle cx="1000" cy="420" r="3"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="310" width="1200" height="2" fill="url(#glow)"/>

  <!-- Hexagon icon -->
  <text x="600" y="240" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" fill="#7c6af7" opacity="0.6">&#x2B21;</text>

  <!-- Primary text -->
  <text x="600" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="56" fill="#e0e0e8" letter-spacing="-1">
    The Decoded Human
  </text>

  <!-- Secondary text -->
  <text x="600" y="400" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="600" font-size="28" fill="#7c6af7">
    AI-Powered Literature Connectome
  </text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#6b7280">
    Discovering hidden connections across scientific literature
  </text>

  <!-- Border frame -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1e1e2e" stroke-width="2"/>
</svg>
